<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PandaKay Portfolio</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  
</head>
<body>

  <header>
    <h1>PandaKay</h1>
    <p>Welcome to the official page</p>
  </header>

  <nav>
    <a href="#about">About</a>
    <a href="#gallery">Gallery</a>
    <a href="#links">Links</a>
    <a href="#contact">Contact</a>
  </nav>

  <main>

    <section id="about">
      <div class="card">
        <h2>About</h2>
        <p>
          Add your website description or bio content here.
        </p>
      </div>
    </section>

    <section id="gallery">
      <div class="card">
        <h2>Gallery</h2>

        <img src="image1.jpg" alt="Gallery image" />

        <p>
          Add captions or featured content here.
        </p>
      </div>
    </section>

    <section id="links">
      <div class="card">
        <h2>Social Links</h2>

        <ul>
          <li><a href="https://www.linkedin.com/in/programmingpanda/">LinkedIn</a></li>
          <li><a href="https://github.com/PandaProgrammer">GitHub</a></li>
        </ul>
      </div>
    </section>

    <section id="contact">
      <div class="card">
        <h2>Contact</h2>

        <form>
          <label>Name</label><br />
          <input type="text" name="name" /><br /><br />

          <label>Email</label><br />
          <input type="email" name="email" /><br /><br />

          <label>Message</label><br />
          <textarea rows="5"></textarea><br /><br />

          <button type="submit">Send</button>
        </form>
      </div>
    </section>

  </main>

  <footer>
    ©2026 PandaKay. All rights reserved.
  </footer>

</body>
</html>
